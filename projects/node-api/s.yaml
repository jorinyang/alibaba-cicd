edition: 3.0.0
name: workshop-api
access: default

vars:
  region: cn-hangzhou

resources:
  workshop-api:
    component: fc3
    props:
      region: ${vars.region}
      functionName: workshop-api
      runtime: nodejs18
      code: ./
      handler: index.handler
      memorySize: 512
      timeout: 30
      environmentVariables:
        NODE_ENV: production
        DB_HOST: "$DB_HOST"
        DB_PORT: "$DB_PORT"
        DB_NAME: "$DB_NAME"
        DB_USER: "$DB_USER"
        DB_PASSWORD: "$DB_PASSWORD"
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS