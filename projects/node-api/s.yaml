edition: 3.0.0
name: workshop-api
access: default

vars:
  region: cn-hangzhou

resources:
  workshop-api:
    component: fc3
    props:
      region: ${vars.region}
      functionName: workshop-api
      runtime: nodejs18
      code: ./
      handler: index.handler
      memorySize: 512
      timeout: 30
      environmentVariables:
        NODE_ENV: production
        DB_HOST: pc-bp1dzv8s1n878x4xv.rwlb.rds.aliyuncs.com
        DB_PORT: "5432"
        DB_NAME: workshop_db
        DB_USER: workshop_user
        DB_PASSWORD: Yyy@)!3)@!4
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
      vpcConfig:
        vpcId: ""
        vSwitchIds: []
        securityGroupId: ""
      internetAccess: true