name: Auto Deploy to Alibaba Cloud

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
      OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
      OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy all projects
        run: |
          echo "🚀 开始部署所有项目..."
          
          for PROJECT_DIR in projects/*/; do
            PROJECT=$(basename "$PROJECT_DIR")
            echo ""
            echo "========================================"
            echo "📦 部署项目: $PROJECT"
            echo "========================================"
            
            # 检测项目类型
            if [ -f "$PROJECT_DIR/package.json" ]; then
              if grep -q "express\|koa\|fastify" "$PROJECT_DIR/package.json" 2>/dev/null; then
                TYPE="node-api"
              else
                TYPE="node-spa"
              fi
            else
              TYPE="static"
            fi
            
            echo "检测到类型: $TYPE"
            
            # 部署（继续执行即使失败）
            set +e
            case $TYPE in
              static)
                echo "📤 上传静态文件..."
                bash scripts/deploy-static.sh "$PROJECT_DIR" "$PROJECT"
                ;;
              node-spa)
                echo "🔨 构建并上传..."
                bash scripts/deploy-spa.sh "$PROJECT_DIR" "$PROJECT"
                ;;
              node-api)
                echo "🔧 部署API..."
                bash scripts/deploy-api.sh "$PROJECT_DIR" "$PROJECT"
                ;;
            esac
            set -e
            
            echo "✅ $PROJECT 处理完成"
          done
          
          echo ""
          echo "🎉 所有项目部署完成！"
