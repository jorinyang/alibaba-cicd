name: Auto Deploy - Vercel + Supabase + Aliyun

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  # 阿里云
  ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
  ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
  OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
  OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
  # 香港OSS备份
  OSS_HK_BUCKET: ${{ secrets.OSS_HK_BUCKET }}
  OSS_HK_ENDPOINT: ${{ secrets.OSS_HK_ENDPOINT }}
  # Supabase
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  # Vercel
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  # 数据库(阿里云PolarDB)
  DB_HOST: ${{ secrets.DB_HOST }}
  DB_PORT: ${{ secrets.DB_PORT }}
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
  # ==================== 阶段0: Vercel健康检查 ====================
  vercel-health-check:
    runs-on: ubuntu-latest
    name: 🔍 Vercel健康检查
    outputs:
      vercel_available: ${{ steps.check.outputs.available }}
    steps:
      - name: Check Vercel status
        id: check
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L --connect-timeout 10 "https://vercel.com" || echo "000")
          echo "Vercel HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "✅ Vercel is available"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️ Vercel is NOT available, will use OSS Hong Kong backup"
          fi

  # ==================== 阶段1: Supabase数据库初始化 ====================
  supabase-init:
    runs-on: ubuntu-latest
    name: 🗄️ Supabase配置
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Supabase CLI
        run: |
          npm install -g supabase
          supabase --version

      - name: Test Supabase connection
        run: |
          echo "🔗 Supabase URL: $SUPABASE_URL"
          curl -s "$SUPABASE_URL/rest/v1/" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" | head -c 200
          echo ""
          echo "✅ Supabase connection test completed"

      - name: Run database migrations
        if: github.event.inputs.run_migration == 'true'
        run: |
          echo "📦 Running Supabase migrations..."
          # 检查是否有migrations目录
          if [ -d "supabase/migrations" ]; then
            supabase db push --project-ref $(echo $SUPABASE_URL | grep -o '[a-z0-9]\{20\}') || true
          else
            echo "📝 No migrations directory found, skipping"
          fi

  # ==================== 阶段2: 部署后端API到阿里云FC ====================
  deploy-api:
    runs-on: ubuntu-latest
    name: 🔧 部署后端API (阿里云FC)
    needs: supabase-init
    strategy:
      matrix:
        project: [api-hello, node-api]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Aliyun CLI
        run: |
          curl -sL -o aliyun-cli.tgz https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar -xzf aliyun-cli.tgz
          sudo mv aliyun /usr/local/bin/
          aliyun configure set \
            --access-key-id "$ALIYUN_ACCESS_KEY_ID" \
            --access-key-secret "$ALIYUN_ACCESS_KEY_SECRET" \
            --region cn-hangzhou

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure Serverless Devs
        run: |
          s config add \
            --AccessKeyID "$ALIYUN_ACCESS_KEY_ID" \
            --AccessKeySecret "$ALIYUN_ACCESS_KEY_SECRET" \
            -a default

      - name: Deploy ${{ matrix.project }} to FC
        run: |
          cd projects/${{ matrix.project }}
          
          # 确保 node_modules 存在
          if [ -f "package.json" ]; then
            npm install --production
          fi
          
          # 用envsubst替换s.yaml中的环境变量
          if [ -f "s.yaml" ]; then
            sudo apt-get install -y gettext-base 2>/dev/null || true
            envsubst < s.yaml > s.yaml.tmp && mv s.yaml.tmp s.yaml
          fi
          
          # 部署
          s deploy --use-local

      - name: Get FC endpoint
        run: |
          ACCOUNT_ID=$(aliyun sts GetCallerIdentity --region cn-hangzhou 2>/dev/null | grep -o '"AccountId": "[^"]*"' | awk -F'"' '{print $4}')
          if [ -z "$ACCOUNT_ID" ]; then
            ACCOUNT_ID=$(aliyun ram GetUser -o json 2>/dev/null | grep -o '"AccountId": "[^"]*"' | awk -F'"' '{print $4}')
          fi
          if [ -n "$ACCOUNT_ID" ]; then
            echo "FC_ENDPOINT=https://${ACCOUNT_ID}.cn-hangzhou.fcapp.run/${{ matrix.project }}" >> $GITHUB_ENV
            echo "🔗 API endpoint: https://${ACCOUNT_ID}.cn-hangzhou.fcapp.run/${{ matrix.project }}"
          else
            echo "⚠️ Could not get Account ID"
            echo "FC_ENDPOINT=" >> $GITHUB_ENV
          fi

      - name: Health check
        if: env.FC_ENDPOINT != ''
        continue-on-error: true
        run: |
          echo "⏳ Waiting for FC to be ready..."
          sleep 15
          
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FC_ENDPOINT/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying..."
            sleep 5
          done
          
          echo "⚠️ Health check failed, but deployment was successful"

  # ==================== 阶段3: 部署前端 ====================
  deploy-frontend:
    runs-on: ubuntu-latest
    name: 🎨 部署前端
    needs: [deploy-api, vercel-health-check]
    strategy:
      matrix:
        project: [workshop-grouping, react-app]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ------ 条件分支: Vercel可用时部署到Vercel ------
      - name: Deploy to Vercel
        if: needs.vercel-health-check.outputs.vercel_available == 'true'
        env:
          VERCEL_ORG: "team_$(echo $VERCEL_TOKEN | grep -o 'team_[^_]*' | head -1)"
          VERCEL_PROJECT: ${{ matrix.project }}
        run: |
          echo "🚀 Deploying ${{ matrix.project }} to Vercel..."
          
          # 安装Vercel CLI
          npm install -g vercel
          
          cd projects/${{ matrix.project }}
          
          # 安装依赖
          if [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm && pnpm install
          elif [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi
          
          # 构建
          npm run build
          
          # 部署 (使用token无需交互)
          VERCEL_TOKEN=$VERCEL_TOKEN vercel --yes \
            --token $VERCEL_TOKEN \
            --prod \
            -- cwd/dist
          
          echo "✅ Deployed to Vercel"

      # ------ 条件分支: Vercel不可用时部署到香港OSS ------
      - name: Install oss2
        if: needs.vercel-health-check.outputs.vercel_available != 'true'
        run: pip install oss2

      - name: Deploy to OSS Hong Kong
        if: needs.vercel-health-check.outputs.vercel_available != 'true'
        run: |
          echo "🚀 Vercel unavailable, deploying to OSS Hong Kong backup..."
          
          PROJECT=${{ matrix.project }}
          cd projects/$PROJECT
          
          # 安装依赖并构建
          if [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm && pnpm install && pnpm build
          elif [ -f "package-lock.json" ]; then
            npm ci && npm run build
          else
            npm install && npm run build
          fi
          
          # 检测构建输出目录
          if [ -d "dist" ]; then
            BUILD_DIR="dist"
          elif [ -d "build" ]; then
            BUILD_DIR="build"
          else
            echo "❌ No build output found"
            exit 1
          fi
          
          # 上传到香港OSS
          python3 << 'PYEOF'
          import oss2
          import os
          import sys

          auth = oss2.Auth(os.environ['ALIYUN_ACCESS_KEY_ID'], os.environ['ALIYUN_ACCESS_KEY_SECRET'])
          bucket = oss2.Bucket(auth, os.environ['OSS_HK_ENDPOINT'], os.environ['OSS_HK_BUCKET'])
          
          project = "$PROJECT"
          build_dir = "$BUILD_DIR"
          
          # 上传所有文件
          for root, dirs, files in os.walk(build_dir):
            for file in files:
              local_path = os.path.join(root, file)
              oss_key = f"{project}/{os.path.relpath(local_path, build_dir)}"
              bucket.put_object_from_file(oss_key, local_path)
              print(f"📤 Uploaded: {oss_key}")
          
          print(f"✅ {project} deployed to OSS Hong Kong")
          PYEOF

  # ==================== 阶段4: 部署静态项目 ====================
  deploy-static:
    runs-on: ubuntu-latest
    name: 📄 部署静态项目
    needs: [deploy-api, vercel-health-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install oss2
        run: pip install oss2

      - name: Deploy static projects
        run: |
          for PROJECT_DIR in projects/*/; do
            PROJECT=$(basename "$PROJECT_DIR")
            
            # 跳过已处理的和后端项目
            if [[ "$PROJECT" == "workshop-grouping" ]] || \
               [[ "$PROJECT" == "react-app" ]] || \
               [[ "$PROJECT" == "api-hello" ]] || \
               [[ "$PROJECT" == "node-api" ]]; then
              continue
            fi
            
            # 检查是否是静态项目（没有package.json或没有构建脚本）
            if [ ! -f "$PROJECT_DIR/package.json" ] || \
               ! grep -q '"build"' "$PROJECT_DIR/package.json" 2>/dev/null; then
              echo "📤 Uploading static project: $PROJECT"
              python3 scripts/upload_to_oss.py "$PROJECT_DIR" "oss://$OSS_BUCKET/$PROJECT/"
              echo "✅ $PROJECT deployed"
            fi
          done

  # ==================== 阶段5: n8n webhook触发 ====================
  trigger-n8n:
    runs-on: ubuntu-latest
    name: 📡 触发n8n工作流
    needs: [deploy-frontend, deploy-static]
    if: github.event.inputs.trigger_n8n != 'false'
    steps:
      - name: Trigger n8n webhook
        run: |
          if [ -n "$N8N_WEBHOOK_URL" ]; then
            curl -X POST "$N8N_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{
                "deployment": "success",
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
                "vercel_available": "'${{ needs.vercel-health-check.outputs.vercel_available }}'",
                "commit": "'${{ github.sha }}'",
                "branch": "'${{ github.ref_name }}'"
              }'
            echo "✅ n8n workflow triggered"
          else
            echo "ℹ️ N8N_WEBHOOK_URL not configured, skipping"
          fi

  # ==================== 阶段6: 通知 ====================
  notify:
    runs-on: ubuntu-latest
    name: 📢 部署通知
    needs: [deploy-api, deploy-frontend, deploy-static, vercel-health-check]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "========================================"
          echo "🎉 部署完成!"
          echo "========================================"
          echo ""
          echo "📊 部署状态:"
          echo "  Vercel可用: ${{ needs.vercel-health-check.outputs.vercel_available }}"
          echo "  API部署: ${{ needs.deploy-api.result }}"
          echo "  前端部署: ${{ needs.deploy-frontend.result }}"
          echo "  静态部署: ${{ needs.deploy-static.result }}"
          echo ""
          echo "🔗 访问地址:"
          echo "  前端(Vercel): https://${{ matrix.project }}.vercel.app"
          echo "  前端(OSS备份): https://$OSS_HK_BUCKET.$OSS_HK_ENDPOINT/${{ matrix.project }}/"
          echo "  API: https://<account-id>.cn-hangzhou.fcapp.run/node-api"
          echo "  Supabase: $SUPABASE_URL"
          echo ""
          echo "💾 备份节点:"
          echo "  OSS Hong Kong: $OSS_HK_BUCKET"
          echo "========================================"
