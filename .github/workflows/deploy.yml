name: 🚀 Auto Deploy - Aliyun OSS + FC + Supabase

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      project_path:
        description: '项目路径 (默认: projects/)'
        required: false
        default: 'projects/'
      run_migration:
        description: '运行数据库迁移'
        required: false
        default: 'false'

env:
  # ========== 阿里云配置 ==========
  ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
  ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
  ALIYUN_ACCOUNT_ID: ${{ secrets.ALIYUN_ACCOUNT_ID }}
  # 香港OSS (主要部署目标)
  OSS_HK_BUCKET: ${{ secrets.OSS_HK_BUCKET }}
  OSS_HK_ENDPOINT: ${{ secrets.OSS_HK_ENDPOINT }}
  # 大陆OSS备份
  OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
  OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
  # ========== Supabase配置 ==========
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  # ========== Vercel备用 ==========
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  # ========== n8n编排 ==========
  N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}

jobs:
  # ==================== 阶段0: 环境检查 ====================
  env-check:
    runs-on: ubuntu-latest
    name: 🔍 环境检查
    outputs:
      vercel_available: ${{ steps.check.outputs.available }}
      oss_hk_configured: ${{ steps.check.outputs.oss_hk }}
    steps:
      - name: Check environment
        id: check
        run: |
          echo "📋 检查部署环境..."
          
          # 检查Vercel
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L --connect-timeout 10 "https://vercel.com" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "✅ Vercel可用"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️ Vercel不可用，将使用OSS香港"
          fi
          
          # 检查OSS香港配置
          if [ -n "$OSS_HK_BUCKET" ] && [ -n "$OSS_HK_ENDPOINT" ]; then
            echo "oss_hk=true" >> $GITHUB_OUTPUT
            echo "✅ OSS香港已配置: $OSS_HK_BUCKET"
          else
            echo "oss_hk=false" >> $GITHUB_OUTPUT
            echo "❌ OSS香港未配置"
          fi

  # ==================== 阶段1: Supabase连接测试 ====================
  supabase-check:
    runs-on: ubuntu-latest
    name: 🗄️ Supabase连接测试
    steps:
      - name: Test Supabase connection
        run: |
          echo "🔗 Supabase URL: $SUPABASE_URL"
          RESPONSE=$(curl -s "$SUPABASE_URL/rest/v1/" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "📦 Supabase响应: $(echo $RESPONSE | head -c 100)"
          echo "✅ Supabase连接测试完成"

  # ==================== 阶段2: 香港FC部署 ====================
  deploy-fc-hk:
    runs-on: ubuntu-latest
    name: 🌏 部署FC香港
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure Serverless Devs
        run: |
          s config add \
            --AccessKeyID "$ALIYUN_ACCESS_KEY_ID" \
            --AccessKeySecret "$ALIYUN_ACCESS_KEY_SECRET" \
            --AccountID "$ALIYUN_ACCOUNT_ID" \
            -a hk-fc

      - name: Deploy fc-hk-api
        run: |
          if [ -d "projects/fc-hk-api" ]; then
            cd projects/fc-hk-api
            
            if [ -f "package.json" ]; then
              npm install --production
            fi
            
            if [ -f "s.yaml" ]; then
              sudo apt-get install -y gettext-base 2>/dev/null || true
              envsubst < s.yaml > s.yaml.tmp && mv s.yaml.tmp s.yaml
            fi
            
            s deploy --access hk-fc -y
            echo "✅ FC香港部署完成"
          else
            echo "ℹ️ 无FC香港项目，跳过"
          fi

      - name: FC香港健康检查
        continue-on-error: true
        run: |
          sleep 15
          if [ -n "$ALIYUN_ACCOUNT_ID" ]; then
            ENDPOINT="https://${ALIYUN_ACCOUNT_ID}.cn-hongkong.fcapp.run/fc-hk-api"
            for i in {1..5}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$ENDPOINT/api/health" || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ FC香港健康检查通过"
                exit 0
              fi
              sleep 5
            done
            echo "⚠️ FC香港健康检查未通过"
          fi

  # ==================== 阶段3: 智能前端部署 ====================
  deploy-frontend:
    runs-on: ubuntu-latest
    name: 🎨 部署前端
    needs: [env-check, supabase-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          # React/Vue/Vite项目
          - project_path: .
            build_cmd: pnpm install && pnpm build
            env_keys: VITE_SUPABASE_URL=VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY=VITE_SUPABASE_ANON_KEY
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build or use existing dist
        run: |
          cd ${{ matrix.project_path }}
          
          # 注入Supabase配置到 .env
          echo "VITE_SUPABASE_URL=$SUPABASE_URL" > .env.local
          echo "VITE_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env.local
          echo "VITE_API_URL=https://${ALIYUN_ACCOUNT_ID}.cn-hongkong.fcapp.run/fc-hk-api" >> .env.local
          
          # 显示当前目录内容
          echo "📁 当前目录内容:"
          ls -la
          
          # 清理旧的dist目录
          rm -rf dist
          
          # 自动检测包管理器
          if [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm
            pnpm install
            pnpm build
          elif [ -f "yarn.lock" ]; then
            yarn install
            yarn build
          elif [ -f "package-lock.json" ]; then
            npm ci
            npm run build
          else
            npm install
            npm run build
          fi
          
          echo "✅ 构建完成"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to OSS Hong Kong
        run: |
          pip install oss2 -q
          
          cd ${{ matrix.project_path }}
          
          python3 << 'PYEOF'
          import oss2
          import os

          auth = oss2.Auth(os.environ['ALIYUN_ACCESS_KEY_ID'], os.environ['ALIYUN_ACCESS_KEY_SECRET'])
          bucket = oss2.Bucket(
            auth, 
            os.environ['OSS_HK_ENDPOINT'], 
            os.environ['OSS_HK_BUCKET']
          )
          
          project = "workshop-grouping"
          build_dir = "dist"
          
          if not os.path.exists(build_dir):
            print("❌ dist目录不存在")
            exit(1)
          
          print(f"📤 部署 {project} 到 OSS香港...")
          
          for root, dirs, files in os.walk(build_dir):
            for file in files:
              local_path = os.path.join(root, file)
              oss_key = f"{project}/{os.path.relpath(local_path, build_dir)}"
              bucket.put_object_from_file(oss_key, local_path)
          
          print(f"✅ {project} 已部署到 https://clawshell.online/{project}/")
          PYEOF

      - name: Deploy to Vercel (备用)
        if: needs.env-check.outputs.vercel_available == 'true'
        run: |
          cd ${{ matrix.project_path }}
          
          # 安装Vercel CLI
          npm install -g vercel
          
          # 确保项目已关联
          if [ ! -f ".vercel/project.json" ]; then
            echo "🔗 关联Vercel项目..."
            vercel link --yes --token $VERCEL_TOKEN
          fi
          
          # 部署到Vercel（使用本地构建的dist目录）
          echo "📦 部署到Vercel..."
          vercel deploy --yes --token $VERCEL_TOKEN --prod
          
          echo "✅ Vercel部署完成"
          echo "📍 访问地址: https://alibaba-cicd.vercel.app"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # ==================== 阶段4: 静态文件部署 ====================
  deploy-static:
    runs-on: ubuntu-latest
    name: 📄 部署静态资源
    needs: [env-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy static files to OSS
        run: |
          pip install oss2 -q
          
          python3 << 'PYEOF'
          import oss2
          import os

          auth = oss2.Auth(os.environ['ALIYUN_ACCESS_KEY_ID'], os.environ['ALIYUN_ACCESS_KEY_SECRET'])
          bucket = oss2.Bucket(
            auth, 
            os.environ['OSS_HK_ENDPOINT'], 
            os.environ['OSS_HK_BUCKET']
          )
          
          # 扫描projects目录下的静态项目
          projects_dir = "projects"
          if not os.path.exists(projects_dir):
            print("ℹ️ 无projects目录")
            exit(0)
          
          for project in os.listdir(projects_dir):
            project_path = os.path.join(projects_dir, project)
            
            # 跳过已有构建配置的项目
            if project in ['workshop-grouping', 'react-app', 'api-hello', 'node-api', 'fc-hk-api']:
              continue
            
            # 检查是否为静态项目(无package.json或无build脚本)
            pkg_json = os.path.join(project_path, "package.json")
            if os.path.exists(pkg_json):
              with open(pkg_json) as f:
                pkg = f.read()
                if '"build"' in pkg:
                  continue  # 有build脚本，跳过
            
            # 上传静态文件
            for root, dirs, files in os.walk(project_path):
              for file in files:
                if file.startswith('.'):
                  continue
                local_path = os.path.join(root, file)
                oss_key = f"{project}/{os.path.relpath(local_path, project_path)}"
                bucket.put_object_from_file(oss_key, local_path)
            
            print(f"✅ 静态项目 {project} 已部署")
          PYEOF

  # ==================== 阶段5: Vercel CLI部署 ====================
  vercel-deploy:
    runs-on: ubuntu-latest
    name: ☁️ Vercel部署
    needs: [deploy-frontend]
    if: needs.deploy-frontend.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 下载dist构建产物
        run: |
          pip install oss2 -q
          
          # 从OSS下载到项目根目录的dist/
          python3 << 'PYEOF'
          import oss2
          import os

          auth = oss2.Auth(os.environ['ALIYUN_ACCESS_KEY_ID'], os.environ['ALIYUN_ACCESS_KEY_SECRET'])
          bucket = oss2.Bucket(
            auth, 
            os.environ['OSS_HK_ENDPOINT'], 
            os.environ['OSS_HK_BUCKET']
          )
          
          project = "workshop-grouping"
          dist_dir = "dist"  # 直接下载到当前目录（repo根目录）
          
          print(f"📥 从OSS下载 {project} 构建产物...")
          os.makedirs(dist_dir, exist_ok=True)
          
          count = 0
          for obj in oss2.ObjectIterator(bucket, prefix=f"{project}/"):
            if obj.key.endswith('/'):
              continue
            # 移除prefix，只保留相对路径
            relative_path = obj.key.replace(f"{project}/", "")
            if not relative_path:
              continue
            
            # 创建必要的子目录
            local_path = os.path.join(dist_dir, relative_path)
            local_dir = os.path.dirname(local_path)
            if local_dir:
              os.makedirs(local_dir, exist_ok=True)
            
            bucket.get_object_to_file(obj.key, local_path)
            count += 1
          
          print(f"✅ 已下载 {count} 个文件到 {dist_dir}/")
          
          # 显示下载的文件结构
          print("📁 文件结构（前20个）:")
          for root, dirs, files in os.walk(dist_dir):
            level = root.replace(dist_dir, '').count(os.sep)
            indent = '  ' * level
            print(f"{indent}{os.path.basename(root)}/")
            subindent = '  ' * (level + 1)
            for f in files[:5]:
              print(f"{subindent}{f}")
            if len(files) > 5:
              print(f"{subindent}... 还有 {len(files)-5} 个文件")
            if level > 2:  # 只显示前3层
              break
          PYEOF
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          OSS_HK_ENDPOINT: ${{ secrets.OSS_HK_ENDPOINT }}
          OSS_HK_BUCKET: ${{ secrets.OSS_HK_BUCKET }}

      - name: 安装Vercel CLI
        run: npm install -g vercel

      - name: 部署到Vercel
        run: |
          echo "☁️ 开始Vercel部署..."
          
          # 调试：检查环境
          echo "📁 当前目录: $(pwd)"
          echo "📁 目录内容:"
          ls -la
          
          echo ""
          echo "📁 .vercel 目录:"
          ls -la .vercel/ 2>/dev/null || echo "❌ .vercel目录不存在"
          
          echo ""
          echo "📁 dist 目录:"
          ls -la dist/ 2>/dev/null || echo "❌ dist目录不存在"
          
          if [ ! -d "dist" ] || [ ! -f "dist/index.html" ]; then
            echo "❌ dist目录不存在或为空，跳过Vercel部署"
            exit 0
          fi
          
          # 显示dist目录文件数
          FILE_COUNT=$(find dist -type f | wc -l)
          echo "📄 dist目录文件数: $FILE_COUNT"
          
          # 安装Vercel CLI（如果尚未安装）
          if ! command -v vercel &> /dev/null; then
            echo "📦 安装Vercel CLI..."
            npm install -g vercel
          fi
          
          echo ""
          echo "🔧 Vercel CLI版本:"
          vercel --version
          
          echo ""
          echo "🚀 执行部署命令..."
          
          # 复制 .vercel 配置到 dist 目录，确保CLI能识别项目
          if [ -d ".vercel" ]; then
            echo "📋 复制 .vercel 配置到 dist/"
            cp -r .vercel dist/
          fi
          
          # 使用 --cwd 指定工作目录，确保使用正确的项目配置
          cd dist
          
          echo "📦 使用npx部署..."
          
          # 创建 .vercel/output 目录结构（--prebuilt 需要）
          echo "📁 创建 .vercel/output 目录结构..."
          mkdir -p .vercel/output/static
          
          # 复制 dist 文件到 .vercel/output/static/
          if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
            echo "📋 复制 dist 文件到 .vercel/output/static/"
            cp -r dist/* .vercel/output/static/
          else
            echo "⚠️ dist 目录为空或不存在"
          fi
          
          # 创建 config.json
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              {
                "src": "/(.*)",
                "dest": "/static/$1"
              }
            ]
          }
          EOF
          
          # 使用 --prebuilt 标志跳过Vercel构建，直接部署静态文件
          echo "📦 使用 --prebuilt 标志部署静态文件..."
          npx vercel@latest --yes --token $VERCEL_TOKEN --prebuilt . 2>&1 | tee ../vercel-npx.log
          
          echo "📋 npx输出:"
          cat ../vercel-npx.log
          
          DEPLOY_URL=$(grep -o 'https://[^[:space:]]*vercel.app' ../vercel-npx.log | tail -1)
          
          if [ -n "$DEPLOY_URL" ]; then
            echo ""
            echo "✅ Vercel部署成功: $DEPLOY_URL"
            
            # 验证部署
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL" --max-time 10)
            echo "🌐 部署验证: HTTP $STATUS"
          else
            echo ""
            echo "⚠️ 无法从日志获取部署URL"
            
            # 尝试从Vercel API获取最新部署
            LATEST_URL=$(curl -s "https://api.vercel.com/v6/deployments?project=alibaba-cicd&limit=1" \
              -H "Authorization: Bearer $VERCEL_TOKEN" 2>/dev/null | jq -r '.deployments[0].url')
            
            if [ -n "$LATEST_URL" ] && [ "$LATEST_URL" != "null" ]; then
              echo "🌐 最新部署: https://$LATEST_URL"
              curl -s -o /dev/null -w "验证: HTTP %{http_code}\n" "https://$LATEST_URL" --max-time 10
            else
              echo "❌ 无法获取部署信息"
            fi
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # ==================== 阶段6: n8n编排触发 ====================
  trigger-n8n:
    runs-on: ubuntu-latest
    name: 📡 触发n8n工作流
    needs: [deploy-frontend, deploy-static]
    if: always()
    steps:
      - name: Trigger n8n webhook
        if: env.N8N_WEBHOOK_URL != ''
        run: |
          curl -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"deployment_completed\",
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
              \"repository\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"frontend_status\": \"${{ needs.deploy-frontend.result }}\",
              \"static_status\": \"${{ needs.deploy-static.result }}\"
            }"
          echo "✅ n8n工作流已触发"

  # ==================== 阶段6: 部署报告 ====================
  deploy-report:
    runs-on: ubuntu-latest
    name: 📊 部署报告
    needs: [deploy-fc-hk, deploy-frontend, deploy-static, trigger-n8n]
    if: always()
    steps:
      - name: Generate deployment report
        run: |
          echo "========================================"
          echo "🎉 部署完成报告"
          echo "========================================"
          echo ""
          echo "📊 部署状态:"
          echo "  ✅ FC香港: ${{ needs.deploy-fc-hk.result }}"
          echo "  ✅ 前端部署: ${{ needs.deploy-frontend.result }}"
          echo "  ✅ 静态资源: ${{ needs.deploy-static.result }}"
          echo ""
          echo "🌐 访问地址:"
          echo "  📍 主站: https://clawshell.online"
          echo "  📍 workshop-grouping: https://clawshell.online/workshop-grouping/"
          echo "  📍 FC API: https://${ALIYUN_ACCOUNT_ID}.cn-hongkong.fcapp.run/fc-hk-api"
          echo ""
          echo "🗄️ 数据库:"
          echo "  📍 Supabase: $SUPABASE_URL"
          echo ""
          echo "📅 时间: $(date)"
          echo "========================================"
